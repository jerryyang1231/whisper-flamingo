train_name: whisper
audio_max_length: 160000 # 10 sec
text_max_length: null
accelerator: auto
weight_decay: 0.01
adam_epsilon: 1.0e-8
num_worker: 16
validate_every_n_batches: 4000
# validate_every_n_batches: 8000
num_devices: 1
precision: 16-mixed

model_name: small
learning_rate: 1.0e-6
# learning_rate: 2.0e-6
batch_size: 2
num_train_steps: 720000
warmup_steps: 120000
gradient_accumulation_steps: 1
# num_train_steps: 360000
# warmup_steps: 60000
# gradient_accumulation_steps: 2

monitor: 'val/cer_at'  
noise_prob: 0.0
noise_snr_train: 0

spec_augment: ""
dropout_rate: 0 

lang: zh
resume_training: False

pt_ckpt: 'whisper_taigi_small/step-78000-cer=0.1811-wer=0.6140.ckpt'
train_id: kg-whisper_lr=1.0e-6
# train_id: kg-whisper_lr=2.0e-6

# text
add_gated_x_attn: 0 # 0 for False, 1 for True
bert_encoder: False
mode: ""
sequential_gated_x_attn: False # False for parallel flamingo

# prompt
prompt: 1 # 0 for False, 1 for True
max_keywords_for_prompt: 5

log_output_dir: "slurm/train_text_slurm"
check_output_dir: "models/checkpoints"
filename: "step-{step:05d}-cer_at={val/cer_at:.4f}"
